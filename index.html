<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, height=device-height, viewport-fit=cover" />
    <meta name="description" content="NovaBanque — Votre banque en ligne sécurisée" />
    <title>NovaBanque</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Anti-cache headers -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Force reload on development -->
    <script>
      // Force reload if this is a new version
      const version = Date.now();
      if (localStorage.getItem('app_version') !== version.toString()) {
        localStorage.setItem('app_version', version.toString());
        // Clear caches
        if ('caches' in window) {
          caches.keys().then(names => {
            names.forEach(name => {
              caches.delete(name);
            });
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx?v=1"></script>
  </body>
</html>
